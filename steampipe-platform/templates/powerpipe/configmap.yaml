apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "steampipe-platform.fullname" . }}-powerpipe-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "steampipe-platform.labels" . | nindent 4 }}
data:
  steampipe.ppc: |
    connection "steampipe" "default" {
      host     = "{{ include "steampipe-platform.dbHost" . }}"
      port     = 5432
      db       = "steampipe"
      username = "steampipe"
      password = env("PGPASSWORD")
    }
